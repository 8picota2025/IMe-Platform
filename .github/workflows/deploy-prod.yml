name: Deploy Producción

# Solo manual hasta F5: el deploy automático en cada push a main
# publicaría el sitio con catálogo mock y copy EN sin revisar en cuanto
# existan los secretos FTP. Reactivar push/repository_dispatch al cerrar
# F5 (auditoría, legales y despliegue).
on:
  workflow_dispatch:
  push:
    branches: [main]
  repository_dispatch:
    types: [trigger-rebuild]

concurrency:
  group: deploy-prod
  cancel-in-progress: true

jobs:
  deploy:
    name: Build · Deploy Producción
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

      - name: Deploy to Hostinger Producción (FTP)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.HOSTINGER_FTP_HOST }}
          username: ${{ secrets.HOSTINGER_FTP_USER }}
          password: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: ${{ secrets.HOSTINGER_PROD_PATH }}
